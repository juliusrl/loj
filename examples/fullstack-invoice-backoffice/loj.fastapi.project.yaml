app:
  name: invoice-backoffice

targets:
  frontend:
    type: web
    entry: frontend/app.web.loj
    outDir: generated/frontend
  backend:
    type: api
    entry: backend/app.fastapi.api.loj
    outDir: generated/backend-fastapi

dev:
  host:
    type: react-vite
    target: frontend
    dir: ../../subprojects/rdsl/examples/user-admin/host
    apiBase: /api
    proxyTarget: backend
  server:
    target: backend
