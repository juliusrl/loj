app:
  name: user-admin

targets:
  frontend:
    type: web
    entry: ../../subprojects/rdsl/examples/user-admin/app.web.loj
    outDir: generated/frontend
  backend:
    type: api
    entry: ../../subprojects/sdsl/examples/user-service/app.api.loj
    outDir: generated/backend

dev:
  host:
    type: react-vite
    target: frontend
    dir: ../../subprojects/rdsl/examples/user-admin/host
    apiBase: /api
    proxyTarget: backend
  server:
    target: backend
